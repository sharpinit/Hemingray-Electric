<script>
  /* ─── Mobile Menu ─────────────────────────────────────────── */
  const btn    = document.getElementById('hamburgerBtn');
  const drawer = document.getElementById('mobileDrawer');

  function openDrawer() {
    drawer.classList.add('open');
    drawer.setAttribute('aria-hidden', 'false');
    btn.setAttribute('aria-expanded', 'true');
    btn.setAttribute('aria-label', 'Close navigation menu');
    document.body.style.overflow = 'hidden';
    const firstLink = drawer.querySelector('a');
    if (firstLink) firstLink.focus();
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    drawer.setAttribute('aria-hidden', 'true');
    btn.setAttribute('aria-expanded', 'false');
    btn.setAttribute('aria-label', 'Open navigation menu');
    document.body.style.overflow = '';
    btn.focus();
  }

  btn.addEventListener('click', () => {
    drawer.classList.contains('open') ? closeDrawer() : openDrawer();
  });

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
  });

  drawer.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    const focusable = [...drawer.querySelectorAll('a, button, [tabindex]:not([tabindex="-1"])')];
    const first = focusable[0];
    const last  = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) {
      e.preventDefault(); last.focus();
    } else if (!e.shiftKey && document.activeElement === last) {
      e.preventDefault(); first.focus();
    }
  });

  /* ─── Form Validation (WCAG 3.3.1 / 3.3.3 / 4.1.2) ─────────
     - Sets aria-invalid on each field
     - Shows accessible error messages via role="alert" spans
     - Moves focus to first invalid field on failed submit
     - Announces success via aria-live region
  ────────────────────────────────────────────────────────────── */
  const form     = document.querySelector('form');
  const status   = document.getElementById('cf-status');

  const rules = [
    {
      id:      'cf-name',
      errorId: 'cf-name-error',
      test:    v => v.trim().length >= 2,
      message: 'Please enter your full name (at least 2 characters).'
    },
    {
      id:      'cf-message',
      errorId: 'cf-message-error',
      test:    v => v.trim().length >= 10,
      message: 'Please describe your project (at least 10 characters).'
    }
  ];

  function setError(rule, show) {
    const input = document.getElementById(rule.id);
    const err   = document.getElementById(rule.errorId);
    if (!input || !err) return;
    input.setAttribute('aria-invalid', show ? 'true' : 'false');
    if (show) {
      err.textContent = rule.message;
      err.removeAttribute('hidden');
    } else {
      err.textContent = '';
      err.setAttribute('hidden', '');
    }
  }

  /* Live validation — clear errors as user corrects fields */
  rules.forEach(rule => {
    const input = document.getElementById(rule.id);
    if (!input) return;
    input.addEventListener('input', () => {
      if (input.getAttribute('aria-invalid') === 'true') {
        setError(rule, !rule.test(input.value));
      }
    });
    input.addEventListener('blur', () => {
      /* Only validate on blur if the field has been interacted with */
      if (input.value.trim()) setError(rule, !rule.test(input.value));
    });
  });

  form.addEventListener('submit', e => {
    e.preventDefault();
    let firstInvalid = null;

    rules.forEach(rule => {
      const input = document.getElementById(rule.id);
      const fail  = !rule.test(input.value);
      setError(rule, fail);
      if (fail && !firstInvalid) firstInvalid = input;
    });

    if (firstInvalid) {
      /* Move focus to first invalid field so screen readers announce the error */
      firstInvalid.focus();
      status.textContent = 'Please correct the errors above and try again.';
      return;
    }

    /* Success state */
    status.textContent = 'Message sent! We\'ll be in touch within 1 business day.';
    form.reset();
    rules.forEach(rule => setError(rule, false));
  });
</script>
